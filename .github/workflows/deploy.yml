name: 🚀 Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub namespace is read from a repo variable so forks can substitute
  # their own. Set `DOCKERHUB_NAMESPACE` under repo Variables (not Secrets —
  # it's not sensitive but it does identify the owner).
  API_IMAGE: ${{ vars.DOCKERHUB_NAMESPACE }}/kickgateway-api
  WORKER_IMAGE: ${{ vars.DOCKERHUB_NAMESPACE }}/kickgateway-worker

jobs:
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/TailoredApps.KickGateway.Api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/TailoredApps.KickGateway.Worker/Dockerfile
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  deploy:
    name: 🖥️ Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"

          # Project directory (idempotent)
          $SSH_CMD "sudo mkdir -p /opt/apps/kickgateway && sudo chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} /opt/apps/kickgateway"

          # Generate production compose file
          cat > /tmp/docker-compose.prod.yml << 'COMPOSE'
          networks:
            default:
              # kickgateway internal — api ↔ worker (service discovery)
            traefik-public:
              external: true
            db-internal:
              external: true

          services:
            api:
              image: ${{ vars.DOCKERHUB_NAMESPACE }}/kickgateway-api:latest
              restart: unless-stopped
              environment:
                - ASPNETCORE_ENVIRONMENT=Production
                - ConnectionStrings__KickGateway=${DB_CONNECTION_STRING:-}
                - RabbitMq__Host=${RABBITMQ_HOST:-rabbitmq}
                - RabbitMq__Port=${RABBITMQ_PORT:-5672}
                - RabbitMq__VirtualHost=${RABBITMQ_VHOST:-/}
                - RabbitMq__Username=${RABBITMQ_USERNAME:-}
                - RabbitMq__Password=${RABBITMQ_PASSWORD:-}
                - Kick__AuthBaseUrl=https://id.kick.com
                - Kick__ApiBaseUrl=https://api.kick.com
                - Kick__WebhookUrl=${KICK_WEBHOOK_URL:-}
                - Kick__PublicKeyCacheMinutes=60
                - Seed__SuperAdminUsername=${SEED_SUPERADMIN_USERNAME:-}
              networks:
                - default
                - traefik-public
                - db-internal
              labels:
                - "traefik.enable=true"
                - "traefik.http.routers.kickgateway-api.rule=Host(`${PUBLIC_HOST}`)"
                - "traefik.http.routers.kickgateway-api.entrypoints=websecure"
                - "traefik.http.routers.kickgateway-api.tls=true"
                - "traefik.http.routers.kickgateway-api.tls.certresolver=letsencrypt-dns"
                - "traefik.http.routers.kickgateway-api.tls.domains[0].main=${PUBLIC_HOST}"
                - "traefik.http.services.kickgateway-api.loadbalancer.server.port=8080"
                - "traefik.docker.network=traefik-public"

            worker:
              image: ${{ vars.DOCKERHUB_NAMESPACE }}/kickgateway-worker:latest
              restart: unless-stopped
              depends_on:
                - api
              environment:
                - DOTNET_ENVIRONMENT=Production
                - RabbitMq__Host=${RABBITMQ_HOST:-rabbitmq}
                - RabbitMq__Port=${RABBITMQ_PORT:-5672}
                - RabbitMq__VirtualHost=${RABBITMQ_VHOST:-/}
                - RabbitMq__Username=${RABBITMQ_USERNAME:-}
                - RabbitMq__Password=${RABBITMQ_PASSWORD:-}
              networks:
                - default
                - traefik-public
          COMPOSE

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/docker-compose.prod.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/apps/kickgateway/docker-compose.yml

          # Write .env with secrets
          $SSH_CMD "cat > /opt/apps/kickgateway/.env << 'ENVFILE'
          DB_CONNECTION_STRING=${{ secrets.DB_CONNECTION_STRING }}
          RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
          RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
          RABBITMQ_VHOST=${{ secrets.RABBITMQ_VHOST }}
          RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
          KICK_WEBHOOK_URL=${{ secrets.KICK_WEBHOOK_URL }}
          SEED_SUPERADMIN_USERNAME=${{ secrets.SEED_SUPERADMIN_USERNAME }}
          PUBLIC_HOST=${{ secrets.PUBLIC_HOST }}
          ENVFILE"

          # Ensure shared external networks exist (idempotent).
          $SSH_CMD "docker network create traefik-public 2>/dev/null || true"
          $SSH_CMD "docker network create db-internal 2>/dev/null || true"

          # Docker login on server (for private images, if Docker Hub repo is private)
          $SSH_CMD "docker login -u ${{ secrets.DOCKERHUB_USER }} -p ${{ secrets.DOCKERHUB_TOKEN }}"

          # Pull and deploy
          $SSH_CMD "cd /opt/apps/kickgateway && docker compose pull && docker compose up -d --remove-orphans"

          # Verify
          $SSH_CMD "cd /opt/apps/kickgateway && docker compose ps"

      - name: Health check
        env:
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
        run: |
          sleep 20
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"

          echo "── docker compose ps ──"
          $SSH_CMD "cd /opt/apps/kickgateway && docker compose ps"

          echo "── unhealthy/restarting containers (any?) ──"
          UNHEALTHY=$($SSH_CMD "cd /opt/apps/kickgateway && docker compose ps --format '{{.Name}} {{.Status}}' | grep -E 'unhealthy|Restarting|Exited' || true")
          if [ -n "$UNHEALTHY" ]; then
            echo "❌ Unhealthy containers found:"
            echo "$UNHEALTHY"
            $SSH_CMD "cd /opt/apps/kickgateway && docker compose logs --tail 30 api worker"
            exit 1
          fi

          echo "── HTTPS smoke (admin root) ──"
          STATUS=$(curl -ks -o /dev/null -w "%{http_code}" "https://${PUBLIC_HOST}/")
          echo "https://${PUBLIC_HOST}/ -> HTTP $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "❌ Admin root did not return 200/302, dumping api logs:"
            $SSH_CMD "cd /opt/apps/kickgateway && docker compose logs --tail 30 api"
            exit 1
          fi

          echo "── Health endpoint ──"
          HEALTH=$(curl -ks -o /dev/null -w "%{http_code}" "https://${PUBLIC_HOST}/health")
          echo "https://${PUBLIC_HOST}/health -> HTTP $HEALTH"
          # /health only exposed in Development per service defaults — accept 200 or 404.
          if [ "$HEALTH" != "200" ] && [ "$HEALTH" != "404" ]; then
            echo "⚠️ Unexpected /health status — investigate"
          fi

          echo "── Admin UI ──"
          ADMIN=$(curl -ks -o /dev/null -w "%{http_code}" "https://${PUBLIC_HOST}/admin")
          echo "https://${PUBLIC_HOST}/admin -> HTTP $ADMIN"
          if [ "$ADMIN" != "200" ]; then
            echo "❌ /admin did not return 200"
            $SSH_CMD "cd /opt/apps/kickgateway && docker compose logs --tail 30 api"
            exit 1
          fi

          echo "── Webhook endpoint (expects 400/401 without proper signature, NOT 5xx) ──"
          WH=$(curl -ks -o /dev/null -w "%{http_code}" -X POST "https://${PUBLIC_HOST}/api/webhooks/kick" -H "Content-Type: application/json" -d '{}')
          echo "POST /api/webhooks/kick (empty) -> HTTP $WH"
          if [ "$WH" = "500" ] || [ "$WH" = "502" ] || [ "$WH" = "503" ] || [ "$WH" = "504" ]; then
            echo "❌ Webhook endpoint returning 5xx — pipeline crash"
            $SSH_CMD "cd /opt/apps/kickgateway && docker compose logs --tail 30 api"
            exit 1
          fi

          echo "✅ All smoke tests passed"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
