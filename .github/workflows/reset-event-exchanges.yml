name: Reset event exchanges (one-shot)

# Manual-trigger workflow that resolves the post-migration topology mismatch
# where RabbitMQ holds the old fanout exchanges from before topic-routing
# was introduced. Sequence:
#
#   1. Stop api+worker so nothing is racing to redeclare exchanges.
#   2. Delete the 11 stale exchanges via the RabbitMQ HTTP API, run from
#      inside a one-shot curl container attached to the broker's docker
#      network (so we don't depend on host DNS reaching the broker).
#   3. Verify they are gone.
#   4. Start api+worker; MassTransit redeclares them as topic on first use.
#   5. Verify the new exchanges exist and are type=topic.

on:
  workflow_dispatch: {}

jobs:
  fix:
    name: Reset event exchanges
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Discover broker container + network
        id: rabbit
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"

          # Find the running rabbitmq container by image. Works regardless of
          # compose project / container-name suffix.
          RABBIT_NAME=$($SSH_CMD "docker ps --format '{{.Names}}\t{{.Image}}' | awk '\$2 ~ /^rabbitmq/ {print \$1; exit}'")
          if [ -z "$RABBIT_NAME" ]; then
            echo "::error::No running rabbitmq container found on the VPS"
            $SSH_CMD "docker ps --format '  {{.Names}} ({{.Image}})'"
            exit 1
          fi

          # Pick the first docker network the rabbit container is attached to.
          # Inside that network docker DNS resolves the container's own name.
          RABBIT_NET=$($SSH_CMD "docker inspect $RABBIT_NAME --format '{{range \$k, \$_ := .NetworkSettings.Networks}}{{\$k}} {{end}}' | awk '{print \$1}'")
          if [ -z "$RABBIT_NET" ]; then
            echo "::error::Could not determine docker network for $RABBIT_NAME"
            exit 1
          fi

          echo "rabbit_name=$RABBIT_NAME" >> "$GITHUB_OUTPUT"
          echo "rabbit_net=$RABBIT_NET" >> "$GITHUB_OUTPUT"
          echo "Using container: $RABBIT_NAME on network: $RABBIT_NET"

      - name: Stop api+worker (avoid race)
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          echo "── Stopping api+worker before broker cleanup ──"
          $SSH_CMD "cd /opt/apps/kickgateway && docker compose stop api worker"

      - name: Delete stale exchanges via RabbitMQ HTTP API
        env:
          RABBIT_VHOST: ${{ secrets.RABBITMQ_VHOST }}
          RABBIT_USER: ${{ secrets.RABBITMQ_USERNAME }}
          RABBIT_PASS: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBIT_NAME: ${{ steps.rabbit.outputs.rabbit_name }}
          RABBIT_NET: ${{ steps.rabbit.outputs.rabbit_net }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"

          # URL-encode the vhost ('/' → '%2F').
          VHOST_ENC=$(printf '%s' "$RABBIT_VHOST" | python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.stdin.read(), safe=""))')

          EXCHANGES=(
            "TailoredApps.KickGateway.Contracts.Events:ChatMessageSent"
            "TailoredApps.KickGateway.Contracts.Events:ChannelFollowed"
            "TailoredApps.KickGateway.Contracts.Events:ChannelSubscriptionNew"
            "TailoredApps.KickGateway.Contracts.Events:ChannelSubscriptionGifts"
            "TailoredApps.KickGateway.Contracts.Events:ChannelSubscriptionRenewal"
            "TailoredApps.KickGateway.Contracts.Events:LivestreamStatusUpdated"
            "TailoredApps.KickGateway.Contracts.Events:LivestreamMetadataUpdated"
            "TailoredApps.KickGateway.Contracts.Events:ModerationBanned"
            "TailoredApps.KickGateway.Contracts.Events:KicksGifted"
            "TailoredApps.KickGateway.Contracts.Events:ChannelRewardRedemptionUpdated"
            "TailoredApps.KickGateway.Contracts.Events:KickEventUnknown"
          )

          for ex in "${EXCHANGES[@]}"; do
            EX_ENC=$(printf '%s' "$ex" | python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.stdin.read(), safe=""))')
            URL="http://${RABBIT_NAME}:15672/api/exchanges/${VHOST_ENC}/${EX_ENC}"
            echo "── DELETE $ex ──"
            STATUS=$($SSH_CMD "docker run --rm --network '$RABBIT_NET' curlimages/curl:8.10.1 -s -o /dev/null -w '%{http_code}' -u '$RABBIT_USER:$RABBIT_PASS' -X DELETE '$URL'" || echo "ERR")
            case "$STATUS" in
              204) echo "   ✓ deleted (204)";;
              404) echo "   - not present (404), skipping";;
              ERR) echo "::error::curl transport error"; exit 1;;
              *)   echo "::error::unexpected HTTP $STATUS"; exit 1;;
            esac
          done

      - name: Verify exchanges are gone
        env:
          RABBIT_VHOST: ${{ secrets.RABBITMQ_VHOST }}
          RABBIT_USER: ${{ secrets.RABBITMQ_USERNAME }}
          RABBIT_PASS: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBIT_NAME: ${{ steps.rabbit.outputs.rabbit_name }}
          RABBIT_NET: ${{ steps.rabbit.outputs.rabbit_net }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          VHOST_ENC=$(printf '%s' "$RABBIT_VHOST" | python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.stdin.read(), safe=""))')

          echo "── Listing exchanges starting with 'TailoredApps' (expect: none) ──"
          BODY=$($SSH_CMD "docker run --rm --network '$RABBIT_NET' curlimages/curl:8.10.1 -s -u '$RABBIT_USER:$RABBIT_PASS' 'http://${RABBIT_NAME}:15672/api/exchanges/${VHOST_ENC}'")
          echo "$BODY" | python3 -c 'import json, sys
xs = [x for x in json.load(sys.stdin) if x["name"].startswith("TailoredApps")]
for x in xs:
    print(" ", x["name"], "type=" + x["type"])
sys.exit(1 if xs else 0)'
          echo "✅ All TailoredApps exchanges removed"

      - name: Start api+worker
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          echo "── Starting api+worker ──"
          $SSH_CMD "cd /opt/apps/kickgateway && docker compose start api worker"
          echo "── Waiting 20s for MassTransit to declare exchanges ──"
          sleep 20
          $SSH_CMD "cd /opt/apps/kickgateway && docker compose ps"

      - name: Verify exchanges recreated as topic
        env:
          RABBIT_VHOST: ${{ secrets.RABBITMQ_VHOST }}
          RABBIT_USER: ${{ secrets.RABBITMQ_USERNAME }}
          RABBIT_PASS: ${{ secrets.RABBITMQ_PASSWORD }}
          RABBIT_NAME: ${{ steps.rabbit.outputs.rabbit_name }}
          RABBIT_NET: ${{ steps.rabbit.outputs.rabbit_net }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          VHOST_ENC=$(printf '%s' "$RABBIT_VHOST" | python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.stdin.read(), safe=""))')

          echo "── Exchanges starting with 'TailoredApps' (expect type=topic) ──"
          BODY=$($SSH_CMD "docker run --rm --network '$RABBIT_NET' curlimages/curl:8.10.1 -s -u '$RABBIT_USER:$RABBIT_PASS' 'http://${RABBIT_NAME}:15672/api/exchanges/${VHOST_ENC}'")
          echo "$BODY" | python3 -c 'import json, sys
xs = [x for x in json.load(sys.stdin) if x["name"].startswith("TailoredApps")]
for x in xs:
    print(" ", x["name"], "type=" + x["type"])
bad = [x for x in xs if x["type"] != "topic"]
if not xs:
    print("::error::No TailoredApps exchanges found — api+worker may have failed to start.")
    sys.exit(1)
if bad:
    print("::error::Some exchanges are still not topic.")
    sys.exit(1)'
          echo "✅ All TailoredApps exchanges are type=topic"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
